<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotifyMe</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ── Auth Page ── -->
<div id="auth-page">
  <div class="logo">
    <h1>Notify<span>Me</span></h1>
    <p>Stay on top of your tasks</p>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <div id="auth-alert" class="alert hidden"></div>

    <!-- Login form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="At least 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
    </form>
  </div>
</div>

<!-- ── Dashboard Page ── -->
<div id="dashboard-page">
  <div class="dashboard-inner">
    <div class="topbar">
      <h2>Notify<span>Me</span></h2>
      <div class="user-badge">
        <div class="avatar" id="user-avatar">?</div>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <!-- New task -->
    <div class="new-task-card">
      <div class="section-title">New Task</div>
      <div id="task-alert" class="alert hidden"></div>
      <form onsubmit="handleCreateTask(event)">
        <div class="row" style="margin-bottom:10px">
          <input type="text" id="task-title" placeholder="Task title…" required />
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
        <textarea id="task-desc" placeholder="Description (optional)…"></textarea>
      </form>
    </div>

    <!-- Task list -->
    <div class="section-title">Your Tasks</div>
    <div id="tasks-container">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';

  /* ── State ── */
  let token = localStorage.getItem('nm_token') || null;
  let userEmail = localStorage.getItem('nm_email') || null;

  /* ── Init ── */
  if (token) showDashboard();

  /* ── Tab switching ── */
  function showTab(tab) {
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
    document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    clearAlert('auth-alert');
  }

  /* ── Auth ── */
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    clearAlert('auth-alert');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');

      token = data.token;
      userEmail = document.getElementById('login-email').value;
      localStorage.setItem('nm_token', token);
      localStorage.setItem('nm_email', userEmail);
      showDashboard();
    } catch (err) {
      showAlert('auth-alert', err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    clearAlert('auth-alert');

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Registration failed');

      showAlert('auth-alert', 'Account created! You can now sign in.', 'success');
      document.getElementById('register-form').reset();
      showTab('login');
    } catch (err) {
      showAlert('auth-alert', err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function logout() {
    token = null;
    userEmail = null;
    localStorage.removeItem('nm_token');
    localStorage.removeItem('nm_email');
    document.getElementById('dashboard-page').classList.remove('visible');
    document.getElementById('auth-page').style.display = '';
    showTab('login');
  }

  /* ── Dashboard ── */
  function showDashboard() {
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('dashboard-page').classList.add('visible');
    const initial = (userEmail || '?')[0].toUpperCase();
    document.getElementById('user-avatar').textContent = initial;
    loadTasks();
  }

  /* ── Tasks ── */
  async function loadTasks() {
    const container = document.getElementById('tasks-container');
    container.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch(`${API}/tasks`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderTasks(Array.isArray(data) ? data : (data.tasks || []));
    } catch {
      container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:24px">Could not load tasks.</p>';
    }
  }

  function renderTasks(tasks) {
    const container = document.getElementById('tasks-container');
    if (!tasks.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>No tasks yet — add one above!</p>
        </div>`;
      return;
    }

    container.innerHTML = '<div class="tasks-list">' +
      tasks.map(t => `
        <div class="task-item">
          <div class="task-dot"></div>
          <div class="task-body">
            <div class="task-title">${escHtml(t.title)}</div>
            ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
            <div class="task-meta">${t.createdAt ? new Date(t.createdAt).toLocaleString() : ''}</div>
          </div>
        </div>`).join('') +
      '</div>';
  }

  async function handleCreateTask(e) {
    e.preventDefault();
    clearAlert('task-alert');
    const title = document.getElementById('task-title').value.trim();
    const description = document.getElementById('task-desc').value.trim();

    try {
      const res = await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ title, description }),
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Failed to create task');

      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      loadTasks();
    } catch (err) {
      showAlert('task-alert', err.message, 'error');
    }
  }

  /* ── Helpers ── */
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.className = `alert alert-${type}`;
    el.textContent = msg;
  }

  function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert hidden';
    el.textContent = '';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
